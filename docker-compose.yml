services:
  postgres:
    image: postgres:16-alpine
    container_name: ranklocal-postgres
    environment:
      POSTGRES_USER: ranklocal
      POSTGRES_PASSWORD: ranklocal
      POSTGRES_DB: ranklocal
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ranklocal -d ranklocal']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
