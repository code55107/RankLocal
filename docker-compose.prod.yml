services:
  api:
    image: ${IMAGE}
    container_name: ranklocal-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
